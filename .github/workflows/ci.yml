name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  generate-projects:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        pattern:
          - "Batch ETL"
          - "Analytics"
          - "Medallion"
          - "ELT"
        stack:
          - "dbt + DuckDB"
          - "Spark + MinIO"
          - "Airflow + Postgres"

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install degen
        run: pip install .

      - name: Generate project
        run: |
          degen init \
            --name test_project \
            --pattern "${{ matrix.pattern }}" \
            --stack "${{ matrix.stack }}"

      - name: Install project dependencies
        run: |
          cd test_project
          make install

      - name: Run project (when applicable)
        run: |
          cd test_project
          make run || true

      - name: Validate Docker Compose
        run: |
          cd test_project
          make docker-validate