name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  cli:
    name: CLI Tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install degen
        run: pip install .

      - name: Version
        run: degen --version

      - name: List
        run: degen list

      - name: Doctor
        run: degen doctor || true

  generated-projects:
    name: Generated - ${{ matrix.pattern }} / ${{ matrix.stack }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - pattern: "Analytics"
            stack: "dbt + DuckDB"

          - pattern: "Batch ETL"
            stack: "DuckDB Local"

          - pattern: "Batch ETL"
            stack: "dbt + DuckDB"

          - pattern: "ELT"
            stack: "Airflow + Postgres"

          - pattern: "Medallion"
            stack: "Spark + MinIO"

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install degen
        run: pip install .

      - name: Generate project
        run: |
          degen init \
            --name test_project \
            --pattern "${{ matrix.pattern }}" \
            --stack "${{ matrix.stack }}"

      - name: Install dependencies
        run: |
          cd test_project
          make install

      - name: Run locally
        run: |
          cd test_project
          make run

      - name: Docker up
        run: |
          cd test_project
          make docker-up

      - name: Wait for containers
        run: |
          sleep 15
          docker ps

      - name: Docker logs (debug)
        if: always()
        run: |
          cd test_project
          docker compose logs || true

      - name: Docker down
        if: always()
        run: |
          cd test_project
          make docker-down